<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR: Подводная охота за жемчугом</title>

    <!-- Локальные библиотеки (чтобы на телефоне не рвалось CDN) -->
    <script src="vendor/aframe-1.4.0.min.js"></script>
    <script src="vendor/aframe-physics-system-4.2.2.min.js"></script>
    <script src="vendor/aframe-ar.js"></script>

    <style>
      html, body { width: 100%; height: 100%; margin: 0; background: #000; overflow: hidden; }
      body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

      .overlay {
        position: fixed; inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, rgba(0,40,55,0.92) 0%, rgba(0,0,0,0.98) 72%);
        z-index: 30;
        pointer-events: all;
      }
      .overlay.hidden { display: none; }

      .card {
        width: min(560px, calc(100vw - 28px));
        border-radius: 18px;
        border: 1px solid rgba(120, 225, 255, 0.26);
        background: rgba(0, 10, 18, 0.72);
        padding: 18px 18px;
        color: rgba(203,213,225,0.92);
        box-shadow: 0 0 50px rgba(120,225,255,0.10);
      }
      .row { display: flex; gap: 14px; align-items: center; }
      .row img {
        width: 48px; height: 48px;
        border-radius: 12px;
        border: 1px solid rgba(255, 242, 177, 0.32);
        box-shadow: 0 0 24px rgba(255, 242, 177, 0.16);
      }
      h2 {
        margin: 0;
        color: #b8f2ff;
        letter-spacing: 1px;
        text-shadow: 0 0 18px rgba(120,225,255,0.25);
        font-size: 18px;
      }
      .desc { font-size: 13px; line-height: 1.7; margin-top: 10px; }
      .desc b { color: #fff2b1; }
      .btn {
        margin-top: 14px;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.6px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        background: linear-gradient(135deg, #7ef0ff, #22c55e);
        color: #001018;
      }
      .btn-danger { background: linear-gradient(135deg, #ff6b6b, #fff2b1); color: #1c0b0b; }

      #hud {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }
      #hudTop {
        position: fixed; left: 14px; top: 14px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(120, 225, 255, 0.28);
        background: rgba(0, 10, 18, 0.62);
        color: #b8f2ff;
        text-shadow: 0 0 12px rgba(120,225,255,0.22);
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      #hudTop b { color: #fff2b1; }

      #reticle {
        position: fixed;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        width: 46px; height: 46px;
        opacity: 0.95;
      }
      #reticle::before, #reticle::after {
        content: "";
        position: absolute;
        background: rgba(255, 242, 177, 0.9);
        border-radius: 2px;
        box-shadow: 0 0 18px rgba(255,242,177,0.25);
      }
      #reticle::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
      #reticle::after  { width: 100%; height: 2px; left: 0; top: 50%; transform: translateY(-50%); }
      #reticle .ring {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        width: 30px; height: 30px;
        border: 2px solid rgba(120,225,255,0.6);
        border-radius: 50%;
      }

      #flash {
        position: fixed; inset: 0;
        background: rgba(255,255,220,0.10);
        opacity: 0;
        transition: opacity 0.06s;
        z-index: 15;
        pointer-events: none;
      }
      #flash.on { opacity: 1; }
    </style>

    <script>
      const GAME = {
        state: 'menu', // menu | playing | gameover
        score: 0,
        goal: 10,
        timeLeft: 35
      };

      function setHud() {
        const el = document.getElementById('hudText');
        if (el) el.innerHTML = `ЖЕМЧУГ: <b>${GAME.score}/${GAME.goal}</b>  •  ВРЕМЯ: <b>${GAME.timeLeft}s</b>`;
      }

      function sfx(volume = 0.55) {
        const a = document.querySelector('#snd-shot');
        if (!a) return;
        a.volume = volume;
        a.currentTime = 0;
        a.play().catch(() => {});
      }

      function showFlash() {
        const f = document.getElementById('flash');
        if (!f) return;
        f.classList.add('on');
        setTimeout(() => f.classList.remove('on'), 90);
      }

      function clearTargets() {
        document.querySelectorAll('.pearl, .jelly').forEach(el => el.parentNode && el.parentNode.removeChild(el));
      }

      window.startGame = function () {
        GAME.state = 'playing';
        GAME.score = 0;
        GAME.timeLeft = 35;
        setHud();
        clearTargets();
        document.getElementById('screenStart').classList.add('hidden');
        document.getElementById('screenOver').classList.add('hidden');
      };

      function endGame(kind) {
        if (GAME.state !== 'playing') return;
        GAME.state = 'gameover';
        clearTargets();
        document.getElementById('finalTitle').textContent = kind === 'WIN' ? 'СОКРОВИЩЕ СОБРАНО' : 'ВРЕМЯ ВЫШЛО';
        document.getElementById('finalScore').textContent = `ЖЕМЧУГ: ${GAME.score}/${GAME.goal}`;
        document.getElementById('screenOver').classList.remove('hidden');
      }

      window.restartGame = function () {
        sfx(0.25);
        window.startGame();
      };

      AFRAME.registerComponent('timer', {
        init: function () { this.acc = 0; },
        tick: function (t, dt) {
          if (GAME.state !== 'playing') return;
          this.acc += dt;
          if (this.acc < 1000) return;
          this.acc = 0;
          GAME.timeLeft = Math.max(0, GAME.timeLeft - 1);
          setHud();
          if (GAME.score >= GAME.goal) endGame('WIN');
          else if (GAME.timeLeft <= 0) endGame('LOSE');
        }
      });

      // Спавн жемчуга в зоне перед камерой (без перемещения игрока)
      AFRAME.registerComponent('pearl-spawner', {
        init: function () { this.t = 0; this.jt = 0; },
        tick: function (t, dt) {
          if (GAME.state !== 'playing') return;
          this.t += dt;
          this.jt += dt;
          if (this.t > 900) { this.spawnPearl(); this.t = 0; }
          if (this.jt > 1600) { this.spawnJelly(); this.jt = 0; }
        },
        spawnPearl: function () {
          const scene = this.el.sceneEl;
          const p = document.createElement('a-sphere');
          p.classList.add('pearl', 'shootable');

          // случайная точка перед камерой
          const x = (Math.random() - 0.5) * 3.2;
          const y = 1.2 + (Math.random() - 0.5) * 1.3;
          const z = -2.2 - Math.random() * 2.6;

          p.setAttribute('position', `${x} ${y} ${z}`);
          p.setAttribute('radius', '0.14');
          p.setAttribute('material', 'color: #fff2b1; emissive: #2dd4bf; emissiveIntensity: 0.12; metalness: 0.25; roughness: 0.06;');
          p.setAttribute('dynamic-body', 'shape: sphere; mass: 0.2;');
          p.setAttribute('linear-damping', '0.99');
          p.setAttribute('angular-damping', '0.99');
          p.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 1800; loop: true; easing: linear');
          p.setAttribute('animation__bob', `property: position; to: ${x} ${y + 0.12} ${z}; dur: 600; dir: alternate; loop: true; easing: easeInOutSine`);
          p.setAttribute('ttl', 'ms: 5200');

          scene.appendChild(p);
        },
        spawnJelly: function () {
          const scene = this.el.sceneEl;
          const j = document.createElement('a-sphere');
          j.classList.add('jelly', 'shootable');
          const x = (Math.random() - 0.5) * 3.0;
          const y = 1.1 + (Math.random() - 0.5) * 1.4;
          const z = -2.8 - Math.random() * 2.2;
          j.setAttribute('position', `${x} ${y} ${z}`);
          j.setAttribute('radius', '0.20');
          j.setAttribute('material', 'color: #8b5cf6; emissive: #22d3ee; emissiveIntensity: 0.55; opacity: 0.65; transparent: true');
          j.setAttribute('dynamic-body', 'shape: sphere; mass: 0.6;');
          j.setAttribute('linear-damping', '0.98');
          j.setAttribute('angular-damping', '0.98');
          j.setAttribute('animation__pulse', 'property: scale; from: 1 1 1; to: 1.12 0.92 1.12; dur: 650; dir: alternate; loop: true; easing: easeInOutSine');
          j.setAttribute('ttl', 'ms: 4500');
          scene.appendChild(j);
        }
      });

      AFRAME.registerComponent('ttl', {
        schema: { ms: { type: 'number', default: 4000 } },
        init: function () {
          this.killAt = performance.now() + this.data.ms;
        },
        tick: function () {
          if (performance.now() > this.killAt) {
            if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
          }
        }
      });

      // Выстрел: raycast из центра камеры по объектам
      function shoot() {
        if (GAME.state !== 'playing') return;
        showFlash();
        sfx(0.45);

        const gun = document.querySelector('#gun');
        if (gun) gun.emit('fire');

        const cursor = document.querySelector('#cursor');
        if (!cursor || !cursor.components.raycaster) return;
        const hits = cursor.components.raycaster.intersectedEls;
        if (!hits || hits.length === 0) return;
        const hit = hits[0];

        if (hit.classList.contains('pearl')) {
          GAME.score += 1;
          setHud();
          hit.setAttribute('animation__pop', 'property: scale; to: 0 0 0; dur: 140; easing: easeInBack');
          setTimeout(() => hit.parentNode && hit.parentNode.removeChild(hit), 160);
          return;
        }

        // Можно штрафовать за попадание в медузу, но пока просто визуально “лопаем”
        if (hit.classList.contains('jelly')) {
          hit.setAttribute('animation__pop', 'property: scale; to: 0 0 0; dur: 180; easing: easeInBack');
          setTimeout(() => hit.parentNode && hit.parentNode.removeChild(hit), 200);
        }
      }

      document.addEventListener('click', (e) => {
        if (!e.target.closest || e.target.closest('.overlay')) return;
        shoot();
      });
      document.addEventListener('touchstart', (e) => {
        if (!e.target.closest || e.target.closest('.overlay')) return;
        e.preventDefault();
        shoot();
      }, { passive: false });
    </script>
  </head>
  <body>
    <!-- HUD -->
    <div id="hud">
      <div id="hudTop"><span id="hudText">ЖЕМЧУГ: <b>0/10</b> • ВРЕМЯ: <b>35s</b></span></div>
      <div id="reticle"><div class="ring"></div></div>
      <div id="flash"></div>
    </div>

    <!-- Оверлеи -->
    <div id="screenStart" class="overlay">
      <div class="card">
        <div class="row">
          <img src="assets/pearl-icon.png" alt="icon" />
          <div>
            <h2>AR: ОХОТА ЗА ЖЕМЧУГОМ</h2>
            <div style="opacity:0.75; font-size:12px; margin-top:4px;">камера • интерактивность • физика</div>
          </div>
        </div>
        <div class="desc">
          Наводитесь прицелом (центр экрана) и <b>стреляйте тапом</b> по жемчужинам.<br>
          Соберите <b>10</b> штук за <b>35 секунд</b>.
        </div>
        <button class="btn" onclick="startGame()">НАЧАТЬ</button>
      </div>
    </div>

    <div id="screenOver" class="overlay hidden">
      <div class="card">
        <div class="row">
          <img src="assets/pearl-icon.png" alt="icon" />
          <div>
            <h2 id="finalTitle">ВРЕМЯ ВЫШЛО</h2>
            <div id="finalScore" style="opacity:0.85; margin-top:6px">ЖЕМЧУГ: 0/10</div>
          </div>
        </div>
        <button class="btn btn-danger" onclick="restartGame()">ЕЩЁ РАЗ</button>
      </div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      physics="debug: false; gravity: 0 -0.3 0"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best;"
      timer
      pearl-spawner
    >
      <a-assets>
        <img id="tex-sky" src="assets/underwater.jpg">
        <img id="img-ui" src="assets/pearl-icon.png">
        <a-asset-item id="mdl-harpoon" src="assets/harpoon.glb"></a-asset-item>
        <audio id="snd-shot" src="assets/harpoon.mp3" preload="auto"></audio>
      </a-assets>

      <!-- a-sky (требование). В AR оставляем почти прозрачным, чтобы не перекрывал камеру -->
      <a-sky src="#tex-sky" material="opacity: 0.02; transparent: true;"></a-sky>

      <!-- Земля (виртуальное “дно”) + физика -->
      <a-plane id="ground" rotation="-90 0 0" position="0 0 -3" width="30" height="30"
               static-body
               material="src: #tex-sky; repeat: 6 6; color: #083246; opacity: 0.75; transparent: true"></a-plane>

      <!-- Свет -->
      <a-entity light="type: ambient; intensity: 0.95; color: #b8f2ff"></a-entity>
      <a-entity light="type: directional; intensity: 0.85; color: #7ad7ff" position="1 4 3"></a-entity>

      <!-- Камера (AR) + невидимый курсор-рейкастер из центра -->
      <a-entity id="cameraRig">
        <a-camera id="camera" position="0 1.6 0">
          <a-entity id="cursor"
                    cursor="rayOrigin: entity; fuse: false"
                    raycaster="objects: .shootable; far: 20"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                    material="opacity: 0; transparent: true">
          </a-entity>
        </a-camera>

        <!-- “Оружие”/фигура по тематике: 3D модель (Blender) как гарпун/ракушка -->
        <!-- Трансформация предок/потомок: cameraRig -> gun -> deco image -->
        <a-entity id="gun" position="0 0.95 -0.8" rotation="0 180 0" scale="0.18 0.18 0.18"
                  gltf-model="#mdl-harpoon"
                  animation__idle="property: rotation; to: 0 190 0; dur: 1100; dir: alternate; loop: true; easing: easeInOutSine"
                  animation__fire="property: position; from: 0 0.95 -0.8; to: 0 0.95 -0.72; dur: 60; dir: alternate; repeat: 1; startEvents: fire">
          <a-image src="#img-ui" position="0.0 1.1 0.0" width="0.6" height="0.6" opacity="0.9"></a-image>
        </a-entity>
      </a-entity>

      <!-- Текст (внутри сцены) -->
      <a-text value="tap to shoot" position="0 2.2 -2.2" align="center" width="6" color="#fff2b1"></a-text>
    </a-scene>
  </body>
</html>
