<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>AR GPS Demo (AR.js)</title>

    <!-- Локальные библиотеки (чтобы на телефоне не рвалось CDN) -->
    <script src="vendor/aframe-1.4.0.min.js"></script>
    <script src="vendor/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

      .overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        padding: 28px;
        color: white;
        background: radial-gradient(ellipse at center, rgba(0,25,40,0.95) 0%, rgba(0,0,0,0.98) 65%);
        z-index: 10;
        text-align: center;
      }

      .overlay h2 {
        font-size: 22px;
        margin-bottom: 12px;
        letter-spacing: 1px;
        color: #66fff6;
        text-shadow: 0 0 18px rgba(102,255,246,0.6);
      }

      .overlay p {
        font-size: 13px;
        line-height: 1.7;
        max-width: 360px;
        color: #cbd5e1;
        opacity: 0.95;
      }

      .btn {
        margin-top: 16px;
        border: none;
        border-radius: 10px;
        padding: 14px 22px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        background: linear-gradient(135deg, #4cffb0, #0ea5e9);
        color: #031018;
        box-shadow: 0 0 22px rgba(76,255,176,0.22);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .btn:active { transform: scale(0.98); }

      #hud {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 20;
        pointer-events: none;
        display: none;
      }
      #hud.active { display: block; }
      #hud .box {
        background: rgba(0,0,0,0.62);
        border: 1px solid rgba(102,255,246,0.22);
        border-radius: 12px;
        padding: 10px 12px;
        color: #66fff6;
        font-size: 12px;
        text-shadow: 0 0 10px rgba(102,255,246,0.35);
        line-height: 1.5;
      }
      #hud .muted { color: #cbd5e1; opacity: 0.9; }
    </style>

    <script>
      // Мини-демо для AR.js Location Based:
      // - Веб-камера (video background)
      // - GPS (gps-camera)
      // - Объект на координатах (gps-entity-place)
      //
      // Важно: на iOS нужен HTTPS и разрешения на геолокацию/камеру.

      const APP = {
        started: false,
        // Цель будет поставлена автоматически рядом с пользователем после получения GPS.
        // Если GPS не даст координаты, останется запасной вариант.
        fallbackTarget: { lat: 55.768236, lon: 37.502719 },
        target: null,
        targetOffsetMeters: { north: 18, east: 10 }, // "рядом": ~20м
        targetLocked: false
      };

      function $(id) { return document.getElementById(id); }

      function metersToLatLonOffset(lat, northM, eastM) {
        const dLat = northM / 111320;
        const dLon = eastM / (111320 * Math.cos(lat * Math.PI / 180));
        return { dLat, dLon };
      }

      function setTarget(lat, lon, note) {
        APP.target = { lat, lon };
        const targetInfo = $('targetInfo');
        if (targetInfo) {
          targetInfo.textContent =
            `TARGET: ${lat.toFixed(6)}, ${lon.toFixed(6)}` + (note ? `  (${note})` : '');
        }

        const targetEntity = document.querySelector('#target');
        if (targetEntity) {
          targetEntity.setAttribute(
            'gps-entity-place',
            `latitude: ${lat}; longitude: ${lon};`
          );
        }
      }

      function startAR() {
        if (APP.started) return;
        APP.started = true;

        $('start').style.display = 'none';
        $('hud').classList.add('active');

        const scene = document.querySelector('a-scene');
        scene.style.display = 'block';

        // Сразу покажем fallback-цель; как только придёт GPS — заменим на автоматическую рядом с вами
        setTarget(APP.fallbackTarget.lat, APP.fallbackTarget.lon, 'fallback');
      }

      function setLiveInfo(msg) {
        const el = $('liveInfo');
        if (el) el.textContent = msg;
      }

      AFRAME.registerComponent('gps-debug', {
        init: function () {
          const cam = this.el;
          cam.addEventListener('gps-camera-update-position', (e) => {
            const p = e.detail.position;
            setLiveInfo(`YOU: ${p.latitude.toFixed(6)}, ${p.longitude.toFixed(6)}  |  acc≈${Math.round(p.accuracy)}m`);

            // Один раз фиксируем цель рядом с текущими координатами пользователя
            if (!APP.targetLocked) {
              APP.targetLocked = true;
              const off = metersToLatLonOffset(p.latitude, APP.targetOffsetMeters.north, APP.targetOffsetMeters.east);
              setTarget(p.latitude + off.dLat, p.longitude + off.dLon, 'auto');
            }
          });
          cam.addEventListener('gps-camera-error', (e) => {
            setLiveInfo('GPS ERROR: ' + (e.detail && e.detail.message ? e.detail.message : 'unknown'));
            if (!APP.target) setTarget(APP.fallbackTarget.lat, APP.fallbackTarget.lon, 'fallback');
          });
        }
      });
    </script>
  </head>

  <body>
    <div id="start" class="overlay">
      <h2>AR GPS (AR.js)</h2>
      <p>
        Демонстрация работы с <span class="muted">видео‑камерой</span> и <span class="muted">GPS‑координатами</span>.<br><br>
        Нажми Start, затем разреши доступ к камере и геолокации.
      </p>
      <button class="btn" onclick="startAR()">START</button>
    </div>

    <div id="hud">
      <div class="box">
        <div id="targetInfo">TARGET: —</div>
        <div id="liveInfo" class="muted">YOU: —</div>
      </div>
    </div>

    <a-scene
      style="display:none"
      vr-mode-ui="enabled: false"
      embedded
      renderer="antialias: true; alpha: true"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best;"
    >
      <a-assets>
        <a-asset-item id="ship-model" src="assets/turel.glb"></a-asset-item>
        <img id="ui-icon" src="assets/icon.jpg" />
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 1.1" position="2 6 4"></a-entity>

      <!-- Камера с GPS -->
      <a-camera gps-camera rotation-reader gps-debug></a-camera>

      <!-- Объект “на месте” по координатам -->
      <a-entity
        id="target"
        gps-entity-place="latitude: 55.768236; longitude: 37.502719;"
        gltf-model="#ship-model"
        scale="0.25 0.25 0.25"
        rotation="0 180 0"
        animation="property: rotation; to: 0 540 0; dur: 5000; loop: true; easing: linear"
      >
        <!-- Иерархия (потомок) + изображение -->
        <a-plane position="0 1.4 0" width="1.2" height="0.6" material="src: #ui-icon; transparent: true"></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
